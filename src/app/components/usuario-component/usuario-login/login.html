<div class="background-layer">
    <div class="pool-background"
        data-alt="A cinematic, high-resolution wide shot of a luxury infinity pool with crystal clear turquoise water.">
    </div>
</div>

<main class="main-canvas">

    <div #loginCard class="login-card hydro-blur pool-shadow">

        <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:48px;">
            <div class="brand-icon">
                <span class="material-symbols-outlined">water_drop</span>
            </div>
            <h1 class="brand-title">Bienvenido a SMART POOL GUARDIAN</h1>
            <p class="brand-subtitle">Inicia sesión para gestionar tu piscina</p>
        </div>

        <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <div class="field-group">
                <label class="field-label" for="usernameInput">Nombre de Usuario</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined">person</span>
                    <input class="input-field" id="usernameInput" type="text" formControlName="email"
                        placeholder="Ej: nombredeusuario">
                </div>

                <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')"
                    class="error-text">
                    El nombre de usuario es requerido
                </span>
            </div>

            <div class="field-group">
                <label class="field-label" for="passwordInput">Contraseña</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined">lock</span>
                    <input class="input-field input-field--password" id="passwordInput"
                        [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="••••••••">
                    <button class="password-toggle" type="button" (click)="togglePassword()">
                        <span class="material-symbols-outlined">
                            {{ hidePassword ? 'visibility' : 'visibility_off' }}
                        </span>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" formControlName="rememberMe">
                    <span>Mantener sesión iniciada</span>
                </label>
                <a class="forgot-link" href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button class="submit-btn" type="submit" [disabled]="loginForm.invalid">
                <span>Iniciar Sesión</span>
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </form>

        <div class="divider">
            <span><span class="divider-text">O inicia sesión con</span></span>
        </div>

        <div class="social-grid">
            <button class="social-btn" type="button" (click)="loginWithSocial('Google')">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4"></path>
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853"></path>
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05"></path>
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335"></path>
                </svg>
                <span>Google</span>
            </button>
            <button class="social-btn" type="button" (click)="loginWithSocial('Facebook')">
                <svg fill="#1877F2" viewBox="0 0 24 24">
                    <path
                        d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z">
                    </path>
                </svg>
                <span>Facebook</span>
            </button>
        </div>

        <div class="signup-link">
            <p>¿No tienes una cuenta? <a href="#">Crear una cuenta</a></p>
        </div>

    </div>
</main>

<div class="atmospheric-overlay">
    <div class="atmospheric-blob--top"></div>
    <div class="atmospheric-blob--bottom"></div>
</div>
