<div class="background-layer">
    <div class="pool-background"
        data-alt="A cinematic, high-resolution wide shot of a luxury infinity pool with crystal clear turquoise water.">
    </div>
</div>

<main class="main-canvas">

    <div #loginCard class="login-card hydro-blur pool-shadow">

        <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:48px;">
            <div class="brand-icon">
                <span class="material-symbols-outlined">water_drop</span>
            </div>
            <h1 class="brand-title">Bienvenido a SMART POOL GUARDIAN</h1>
            <p class="brand-subtitle">Inicia sesión para gestionar tus piscinas</p>
        </div>

        <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <div class="field-group">
                <label class="field-label" for="usernameInput">Nombre de Usuario</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined">person</span>
                    <input class="input-field" id="usernameInput" type="text" formControlName="email"
                        placeholder="Ej: nombredeusuario">
                </div>

                <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')"
                    class="error-text">
                    El nombre de usuario es requerido
                </span>
            </div>

            <div class="field-group">
                <label class="field-label" for="passwordInput">Contraseña</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined">lock</span>
                    <input class="input-field input-field--password" id="passwordInput"
                        [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="••••••••">
                    <button class="password-toggle" type="button" (click)="togglePassword()">
                    </button>
                </div>
            </div>

            <button class="submit-btn" type="submit" [disabled]="loginForm.invalid">
                <span>Iniciar Sesión</span>
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </form>

        <div class="signup-link">
            <p>¿No tienes una cuenta? <a href="/usuarios/registrar">Crear una cuenta</a></p>
        </div>

    </div>
</main>

<div class="atmospheric-overlay">
    <div class="atmospheric-blob--top"></div>
    <div class="atmospheric-blob--bottom"></div>
</div>
